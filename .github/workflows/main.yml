name: Download and release prebuilt clang-format

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The clang-format version to download and release (e.g., 15.0.7)'
        required: true
        type: string

env:
  WINDOWS_ARTIFACT_NAME: clang-format-${{ inputs.version }}-windows-x86_64
  LINUX_ARTIFACT_NAME: clang-format-${{ inputs.version }}-linux-x86_64

permissions:
  contents: write

jobs:
  clang-format-prebuilt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          path: ./repo
      - name: Run make_release.sh
        run: ./repo/make_release.sh ${{ inputs.version }}
      - name: Commit and tag release
        working-directory: ./repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clang-format/release_info.bzl
          git commit -m "Release clang-format ${{ inputs.version }}"
          git tag -a v${{ inputs.version }} -m "clang-format ${{ inputs.version }}"
          git push origin main --tags
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ inputs.version }} \
            --repo ${{ github.repository }} \
            --title "clang-format ${{ inputs.version }}" \
            $WINDOWS_ARTIFACT_NAME.tar.xz \
            $LINUX_ARTIFACT_NAME.tar.xz
